name: Markdown Linting

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - '.markdownlint.json'
      - 'package.json'
      - 'package-lock.json'

env:
  NODE_VERSION: '24.x'

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run markdown lint
        run: npm run lint:md
